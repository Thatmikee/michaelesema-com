<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="A working paper inside an evidence folder, with a highlighted line and a paperclip">
  <rect width="800" height="600" fill="#f4f1ea"/>
  <ellipse cx="410" cy="486" rx="190" ry="24" fill="#0e1226" opacity="0.05"/>
  <!-- folder -->
  <path d="M196 226 h150 l22 26 h236 v232 a8 8 0 0 1 -8 8 H204 a8 8 0 0 1 -8 -8 z"
        fill="#e7e1d4" stroke="#0e1226" stroke-width="3" stroke-linejoin="round"/>
  <!-- paper sheet -->
  <g transform="rotate(-3 400 330)">
    <rect x="250" y="170" width="320" height="330" rx="4" fill="#ffffff" stroke="#0e1226" stroke-width="3"/>
    <!-- title block -->
    <rect x="284" y="206" width="150" height="14" rx="3" fill="#0e1226"/>
    <!-- yellow highlight behind a line -->
    <rect x="284" y="250" width="252" height="16" rx="2" fill="#f5c518" opacity="0.85"/>
    <!-- text lines -->
    <g stroke="#0e1226" stroke-width="3" opacity="0.78" stroke-linecap="round">
      <path d="M284 258 H520"/>
      <path d="M284 292 H536"/>
      <path d="M284 320 H498"/>
    </g>
    <!-- blue underlined (cited) line -->
    <path d="M284 352 H470" stroke="#2457ff" stroke-width="3" stroke-linecap="round"/>
    <path d="M284 362 H470" stroke="#2457ff" stroke-width="2" opacity="0.5"/>
    <g stroke="#0e1226" stroke-width="3" opacity="0.78" stroke-linecap="round">
      <path d="M284 394 H536"/>
      <path d="M284 422 H452"/>
    </g>
  </g>
  <!-- paperclip -->
  <path d="M512 150 v74 a20 20 0 0 1 -40 0 v-58 a12 12 0 0 1 24 0 v52"
        fill="none" stroke="#2457ff" stroke-width="5" stroke-linecap="round"/>
</svg>
